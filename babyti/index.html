<!DOCTYPE html>
<html lang="ko">
<head>

  <meta name="description" content="Rothbart IBQ-R, Pluess(2015) 환경 민감성 모델 기반 9유형 아기 기질 테스트. 10문항으로 알아보는 우리 아기의 진짜 성향.">
  <meta property="og:title" content="우리 아기 성향 테스트 🍼">
  <meta property="og:description" content="최신 영아 기질 연구 기반 9유형 테스트! 닮은 인물까지 알려드려요">

  <!-- AdSense intentionally NOT loaded on intro/quiz page to prevent Auto Ads clutter.
       Result page (result.html) loads AdSense for manual rectangle ads only. -->

  <!-- Google Analytics (GA4) — replace G-XXXXXXXXXX with your Measurement ID -->

    window.dataLayer = window.dataLayer || [];

<body>
<div class="wrap">

  <!-- ===== INTRO ===== -->
  <div id="page-intro" class="page active">
    <img class="intro-hero" src="baby-cards/hero.webp" alt="베비티아이">
    <h1 class="intro-title">베비티아이</h1>
    <p class="intro-sub">10문항으로 알아보는<br>우리 아기 성향</p>
    <button class="btn-start" onclick="startQuiz()">테스트 시작하기 →</button>
    <span class="intro-tag">총 10문항 · 약 2분 소요 · 생후 3~24개월 권장</span>
    <div class="intro-science">📚 Rothbart IBQ-R · Pluess(2015) 환경 민감성 모델 기반</div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="page-quiz" class="page">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">1 / 10</span>
    </div>
    <div class="q-image-wrap"><img class="q-image" id="qImage" alt=""></div>
    <div class="q-card" id="qCard">
      <span class="axis-tag" id="qAxisTag"></span>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsList"></div>
    </div>
  </div>

  <!-- KAKAO ADFIT (bottom of intro/quiz pages only) -->
  <div style="text-align:center; margin-top:24px;">
    <ins class="kakao_ad_area" style="display:none;"
         data-ad-unit="DAN-dnbh6iksBRXSk3QG"
         data-ad-width="320"
         data-ad-height="100"></ins>
  </div>
  <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>

  <!-- BACK BUTTON (quiz only; shown via JS) -->
  <button class="btn-back" id="qBackBtn" onclick="goBack()" hidden>← 이전으로</button>

  <!-- SITE FOOTER -->
  <footer class="site-footer">
    <div>개발 · 문의 <a href="mailto:unspired100@gmail.com">unspired100@gmail.com</a></div>
    <div class="footer-copy">© 2026 babyti. All rights reserved.</div>
  </footer>

</div><!-- /wrap -->

<script src="shared.js"></script>
<script>

/* ────────────────────────────────────────
   QUESTIONS (10 items)
   axis: 'S' = Surgency, 'N' = Sensitivity
   weights: 0~3 per option, sum per axis = 0~15
──────────────────────────────────────── */
const QUESTIONS = [
  // ── Surgency (외향성/접근성) — 5문항 ──
  { axis:'S', emoji:'👥', text:'낯선 사람을 처음 만났을 때 우리 아기의 반응은?',
    options:[
      { text:'먼저 손을 뻗으며 적극적으로 반긴다', w:3 },
      { text:'금방 친해지고 잘 어울린다', w:2 },
      { text:'잠시 살피다 천천히 마음을 연다', w:1 },
      { text:'익숙해질 때까지 부모 곁에 머문다', w:0 }
    ]},
  { axis:'S', emoji:'🏃', text:'평소 깨어 있을 때 우리 아기의 움직임은?',
    options:[
      { text:'에너지가 넘쳐 끊임없이 움직인다', w:3 },
      { text:'활발하게 움직이며 잘 논다', w:2 },
      { text:'움직임과 휴식을 골고루 즐긴다', w:1 },
      { text:'한 자리에서 차분히 노는 걸 좋아한다', w:0 }
    ]},
  { axis:'S', emoji:'😊', text:'우리 아기는 평소에 얼마나 자주 웃나요?',
    options:[
      { text:'깔깔 소리 내며 크게 자주 웃는다', w:3 },
      { text:'표정이 풍부하고 잘 웃는다', w:2 },
      { text:'기분 좋을 때 은은하게 미소 짓는다', w:1 },
      { text:'차분한 표정으로 마음을 표현한다', w:0 }
    ]},
  { axis:'S', emoji:'🗣️', text:'옹알이나 소리 표현은 어떤가요?',
    options:[
      { text:'쉴 새 없이 옹알이로 이야기한다', w:3 },
      { text:'자주 소리 내며 표현이 풍부하다', w:2 },
      { text:'필요할 때 또렷하게 소리로 표현한다', w:1 },
      { text:'조용히 표정과 몸짓으로 표현한다', w:0 }
    ]},
  { axis:'S', emoji:'🧸', text:'새로운 장난감을 처음 보여주면?',
    options:[
      { text:'바로 달려들어 신나게 가지고 논다', w:3 },
      { text:'호기심 있게 다가가 금방 만져본다', w:2 },
      { text:'천천히 살펴본 뒤 자기 페이스로 논다', w:1 },
      { text:'충분히 관찰한 뒤에야 손을 댄다', w:0 }
    ]},

  // ── Sensitivity (환경 민감성) — 5문항 ──
  { axis:'N', emoji:'🔊', text:'갑작스러운 소리나 강한 빛에 대한 반응은?',
    options:[
      { text:'아주 작은 변화에도 곧바로 반응한다', w:3 },
      { text:'민감하게 알아차리고 표정이 바뀐다', w:2 },
      { text:'잠깐 멈칫하다 금방 다시 집중한다', w:1 },
      { text:'크게 개의치 않고 하던 걸 계속한다', w:0 }
    ]},
  { axis:'N', emoji:'😢', text:'울거나 놀란 후 진정되는 데 얼마나 걸리나요?',
    options:[
      { text:'감정을 깊게 느껴 충분히 달래줘야 한다', w:3 },
      { text:'안아주면 마음이 천천히 풀린다', w:2 },
      { text:'잠깐 토닥이면 금방 기분이 돌아온다', w:1 },
      { text:'스스로 마음을 다잡고 회복한다', w:0 }
    ]},
  { axis:'N', emoji:'🔄', text:'일과나 환경이 바뀌었을 때 반응은?',
    options:[
      { text:'변화를 섬세하게 느끼며 충분한 시간이 필요하다', w:3 },
      { text:'처음엔 신중하다가 점차 익숙해진다', w:2 },
      { text:'잠시 살펴본 뒤 자연스럽게 적응한다', w:1 },
      { text:'어떤 환경에서도 여유롭게 잘 지낸다', w:0 }
    ]},
  { axis:'N', emoji:'👀', text:'부모 표정 변화나 새 물건을 알아차리나요?',
    options:[
      { text:'아주 미세한 변화까지 놓치지 않는다', w:3 },
      { text:'분위기 변화를 잘 감지하는 편이다', w:2 },
      { text:'눈에 띄는 변화는 분명히 알아차린다', w:1 },
      { text:'자기 할 일에 집중해 흐름을 타고 간다', w:0 }
    ]},
  { axis:'N', emoji:'🎪', text:'사람 많은 곳이나 긴 외출 후 모습은?',
    options:[
      { text:'많은 자극을 흡수해 충분한 휴식이 필요하다', w:3 },
      { text:'평소보다 예민해져 조용한 시간을 원한다', w:2 },
      { text:'살짝 피곤해하다 곧 평소처럼 돌아온다', w:1 },
      { text:'오히려 더 신나고 에너지가 충전된다', w:0 }
    ]}
];

/* ────────────────────────────────────────
   QUIZ STATE  (resultType lives in shared.js)
──────────────────────────────────────── */
let surgencyScore = 0;
let sensitivityScore = 0;
let currentQ = 0;
let lastWeight = { S:0, N:0 }; // for tie-breaking
let answers = []; // {axis, weight} per question for back navigation

function resetQuiz() {
  surgencyScore = 0;
  sensitivityScore = 0;
  currentQ = 0;
  lastWeight = { S:0, N:0 };
  answers = [];
}

function startQuiz() {
  resetQuiz();
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('progressFill').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('qAxisTag').textContent = q.axis === 'S' ? '외향성 (Surgency)' : '환경 민감성 (Sensitivity)';
  document.getElementById('qImage').src = `baby-cards/q${currentQ + 1}.webp`;
  // Preload next 1~2 question images so transitions feel instant
  [currentQ + 2, currentQ + 3].forEach(n => {
    if (n >= 1 && n <= total) { const im = new Image(); im.src = `baby-cards/q${n}.webp`; }
  });
  document.getElementById('qText').textContent = q.text;

  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.text;
    btn.addEventListener('click', () => pickOption(q.axis, opt.w, btn));
    list.appendChild(btn);
  });

  const backBtn = document.getElementById('qBackBtn');
  backBtn.disabled = currentQ === 0;
  backBtn.hidden = currentQ === 0;
}

function goBack() {
  if (currentQ === 0) return;
  currentQ--;
  const prev = answers.pop();
  if (prev) {
    if (prev.axis === 'S') surgencyScore -= prev.weight;
    else sensitivityScore -= prev.weight;
  }
  renderQuestion();
}

function pickOption(axis, weight, btn) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');

  if (axis === 'S') surgencyScore += weight;
  else sensitivityScore += weight;
  lastWeight[axis] = weight;
  answers[currentQ] = { axis, weight };

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) renderQuestion();
    else showResult();
  }, 350);
}

/* Convert raw score (0~15) → band (L/M/H)
   Thresholds tuned to give ~30/40/30 marginal split (Lionetti 2018) under
   realistic biased answering (parents avoid extremes). */
function toBand(score) {
  if (score <= 6) return 'L';
  if (score <= 8) return 'M';
  return 'H';
}

function showResult() {
  const sBand = toBand(surgencyScore);
  const nBand = toBand(sensitivityScore);
  // Navigate to standalone result page so AdSense gets a fresh pageview.
  // No `.html` suffix — Vercel cleanUrls + `npx serve` both strip the extension
  // (and `npx serve` drops query params during that redirect).
  location.href = 'result?type=' + sBand + nBand;
}
</script>
</body>
</html>
